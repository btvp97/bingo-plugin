# Metadata used when this plugin is submitted to the Plugin Hub.
# See: https://github.com/runelite/plugin-hub
displayName=Clan Bingo
author=Great Marion
description=Coordinate clan bingo boards with automatic, join-code-protected team sync
tags=bingo,pvm,minigame,clan,skilling
plugins=com.misclickers.bingo.BingoPlugin
version=
# Switched from "gradle" to "standard" once the io.socket:socket.io-client
# dependency (the only reason "gradle" mode was needed) was removed in favor
# of HTTP polling — every remaining dependency (client, lombok, gson,
# okhttp) is already part of RuneLite's own standard build template, so
# there's nothing left for a custom build.gradle to add. "standard" mode
# replaces our build.gradle/settings.gradle with the Hub's own template
# during the Hub build (our local build.gradle is still used for everyday
# IntelliJ development, just not by the Hub's build) — and, more
# importantly, means this submission no longer touches the Hub's shared
# dependency-verification config at all, so it shouldn't get flagged as a
# "dependency change" PR anymore.
build=standard
